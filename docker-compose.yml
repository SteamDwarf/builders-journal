services:
  db:
    image: mysql:8.0
    container_name: construction_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- БЭКЕНД (NestJS + Prisma) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construction_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      # Динамически собираем URL для Prisma, используя переменные из .env
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma generate && 
             npx prisma db push && 
             npx prisma db seed && 
             npm run start:dev"
    depends_on:
      db:
        condition: service_healthy

  # --- ФРОНТЕНД (React + Vite) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construction_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT}/api
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  mysql_data:
