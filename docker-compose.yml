services:
  db:
    image: mysql:8.0
    container_name: construction_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Убрали command с deprecated флагом, так как современные драйверы поддерживают дефолтный caching_sha2_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u$MYSQL_USER",
          "-p$MYSQL_PASSWORD",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s

  # --- БЭКЕНД (NestJS + Prisma) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construction_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      # Ссылку DATABASE_URL отсюда убираем, она автоматически и правильно подтянется из .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma generate --config prisma/prisma.config.ts && 
             npx prisma db push --config prisma/prisma.config.ts && 
             npx prisma db seed --config prisma/prisma.config.ts && 
             npm run start:dev"
    depends_on:
      db:
        condition: service_healthy

  # --- ФРОНТЕНД (React + Vite) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construction_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT}/api
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_started # Гарантирует, что фронт стартует после запуска бэкенда

volumes:
  mysql_data:
